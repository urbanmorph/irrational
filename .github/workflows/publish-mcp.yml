name: Publish to MCP Registry

# Publishes server.json to the official MCP Registry (registry.modelcontextprotocol.io).
# Runs on a GitHub Release, or manually. Auth is GitHub Actions OIDC — the workflow's own
# identity proves the io.github.urbanmorph namespace, so no secrets or stored tokens are needed.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC auth to the registry
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Authenticate (GitHub Actions OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish server.json
        run: mcp-publisher publish
